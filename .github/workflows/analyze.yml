name: Sybil Analysis Pipeline

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dataset_url:
        description: 'URL to wallet list CSV'
        required: false
        type: string
      chain:
        description: 'Chain to analyze'
        required: false
        default: 'ethereum'
        type: choice
        options:
          - ethereum
          - arbitrum
          - optimism
          - base
          - polygon

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure environment
        run: |
          echo "ETH_MAINNET_RPC=${{ secrets.ETH_MAINNET_RPC }}" >> .env
          echo "ETHERSCAN_API_KEY=${{ secrets.ETHERSCAN_API_KEY }}" >> .env
          echo "ARBITRUM_RPC=${{ secrets.ARBITRUM_RPC }}" >> .env
          echo "OPTIMISM_RPC=${{ secrets.OPTIMISM_RPC }}" >> .env

      - name: Run graph building
        run: |
          if [ "${{ github.event.inputs.dataset_url }}" != "" ]; then
            python analysis/graph_builder.py \
              --dataset-url "${{ github.event.inputs.dataset_url }}" \
              --chain "${{ github.event.inputs.chain }}" \
              --output data/current_graph.gpickle
          else
            python analysis/graph_builder.py \
              --chain "${{ github.event.inputs.chain }}" \
              --output data/current_graph.gpickle
          fi

      - name: Run cluster detection
        run: |
          python analysis/cluster_detector.py \
            --graph data/current_graph.gpickle \
            --output data/clusters.json

      - name: Run score calculation
        run: |
          python analysis/score_calculator.py \
            --clusters data/clusters.json \
            --graph data/current_graph.gpickle \
            --output reports/output/

      - name: Generate summary
        run: |
          echo "## Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python scripts/generate_summary.py

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            reports/output/
            data/current_graph.gpickle
            data/clusters.json
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          slack-message: 'Sybil analysis pipeline failed for chain ${{ github.event.inputs.chain }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
